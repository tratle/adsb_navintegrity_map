services:
  adsb-nic-map:
    build: .
    container_name: adsb-nic-map
    restart: unless-stopped
    ports:
      - "8050:8050"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8050/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
